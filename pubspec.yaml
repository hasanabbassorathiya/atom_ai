name: atom_ai
description: "Atom AI - On-device AI assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  sqflite: ^2.4.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  file_picker: ^10.3.10
  permission_handler: ^11.4.0
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  intl: ^0.20.2
  share_plus: ^12.0.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  image: ^4.0.0
  camera: ^0.11.0
  syncfusion_flutter_pdf: ^28.2.5
  firebase_core: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
